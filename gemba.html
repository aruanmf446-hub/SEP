<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>SEP | Abrindo Construtor Gemba</title>
  <script>
    (function () {
      const target = new URL('./gemba-blob.html', window.location.href);
      const current = new URL(window.location.href);
      current.searchParams.forEach((value, key) => target.searchParams.set(key, value));
      target.searchParams.set('build', 'blob-v1');
      window.location.replace(target.toString());
    })();
  </script>
</head>

</html>
